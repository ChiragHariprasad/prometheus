x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

x-dns: &default-dns
  dns:
    - 1.1.1.1
    - 8.8.8.8
    - 8.8.4.4

x-network: &default-network
  networks:
    - prometheus-network

services:
  # ---- API Gateway ----  # TODO: Production — Traefik is provisioned but frontend accesses backend directly
  traefik:
    image: traefik:v3.1
    <<: *default-restart
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - prometheus-network
    logging: *default-logging

  # ---- Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=prometheus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=prometheus
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - EMBEDDING_DEVICE=cpu
    ports:
      - "8004:8000"
    volumes:
      - ./backend:/app
      - model-cache:/model-cache
    networks:
      - prometheus-network
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      - backend
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_WS_URL=ws://localhost:8004
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - prometheus-network
    logging: *default-logging

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    environment:
      POSTGRES_USER: prometheus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prometheus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    networks:
      - prometheus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prometheus"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    <<: *default-restart
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - prometheus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 6G

  # ---- Kafka ----
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    <<: *default-restart
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 107374182400
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_CONFLUENT_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - prometheus-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    <<: *default-restart
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - prometheus-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    <<: *default-restart
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    networks:
      - prometheus-network
    logging: *default-logging

  # ---- Qdrant ----
  qdrant:
    image: qdrant/qdrant:v1.11.1
    <<: *default-restart
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - prometheus-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 8G

  # ---- MLflow ----
  mlflow:
    build:
      context: ./infrastructure/mlflow
      dockerfile: Dockerfile
    <<: *default-restart
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_BACKEND_STORE_URI: postgresql://prometheus:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow/artifacts
    networks:
      - prometheus-network
    logging: *default-logging

  # ---- ClickHouse ----  # TODO: Production — not queried by app, provisioned for future analytics
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    <<: *default-restart
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - prometheus-network
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G

  # ---- Monitoring ----
  prometheus:
    image: prom/prometheus:v2.54.0
    <<: *default-restart
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prometheus-network
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.2.0
    <<: *default-restart
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - prometheus-network
    logging: *default-logging

  # ---- Background Workers ----
  worker-twin-builder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *default-restart
    command: python -m app.tasks.twin_builder
    depends_on:
      - postgres
      - redis
      - kafka
      - qdrant
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - QDRANT_HOST=qdrant
    networks:
      - prometheus-network
    logging: *default-logging
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2"
          memory: 4G

  worker-prediction:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *default-restart
    command: python -m app.tasks.prediction_worker
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - prometheus-network
    logging: *default-logging
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G

  worker-simulation:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *default-restart
    command: python -m app.tasks.simulation_worker
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - prometheus-network
    logging: *default-logging
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "4"
          memory: 8G

  worker-notification:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *default-restart
    command: python -m app.tasks.notification_worker
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - prometheus-network
    logging: *default-logging
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  qdrant-data:
  mlflow-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  model-cache:

networks:
  prometheus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
